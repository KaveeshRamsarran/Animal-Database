services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wildatlas}
      POSTGRES_USER: ${POSTGRES_USER:-wildatlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wildatlas_secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wildatlas}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-wildatlas}:${POSTGRES_PASSWORD:-wildatlas_secret}@db:5432/${POSTGRES_DB:-wildatlas}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-wildatlas}:${POSTGRES_PASSWORD:-wildatlas_secret}@db:5432/${POSTGRES_DB:-wildatlas}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-please}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@wildatlas.com}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
      CORS_ORIGINS: '["http://localhost","http://localhost:5173"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
