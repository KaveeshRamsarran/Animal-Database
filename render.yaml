# Render.com Infrastructure-as-Code blueprint
# Deploy with: Connect your GitHub repo on Render → it auto-detects this file.

services:
  # ── Backend API ──────────────────────────────────────
  - type: web
    name: wildatlas-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free          # or starter ($7/mo) for always-on
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wildatlas-db
          property: connectionString
        # NOTE: Render gives postgresql:// — must override in dashboard to:
        # postgresql+asyncpg://user:pass@host/dbname
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: wildatlas-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@wildatlas.com
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: Admin123!
      - key: CORS_ORIGINS
        value: '["https://wildatlas-frontend.onrender.com"]'

  # ── Frontend (Static Site) ──────────────────────────
  - type: web
    name: wildatlas-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://wildatlas-api.onrender.com/api/v1

databases:
  - name: wildatlas-db
    plan: free          # 1 GB, 90-day retention on free
    databaseName: wildatlas
    user: wildatlas
